apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{cookiecutter.project_slug}}
  namespace: {{cookiecutter.k8s_namespace}}
spec:
  replicas: 2
  selector:
    matchLabels:
      app: {{cookiecutter.project_slug}}
  template:
    metadata:
      labels:
        app: {{cookiecutter.project_slug}}
    spec:
      containers:
        - name: {{cookiecutter.project_slug}}
          image: "{% raw %}{{DOCKER_REPO}}:{{GIT_COMMIT_SHA}}{% endraw %}"
          ports:
            - containerPort: 8000
          env:
            - name: {{cookiecutter.package_name_upper}}_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{cookiecutter.project_slug}}-secrets
                  key: jwt-secret
            - name: {{cookiecutter.package_name_upper}}_S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: {{cookiecutter.project_slug}}-secrets
                  key: s3-endpoint
            - name: {{cookiecutter.package_name_upper}}_S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: {{cookiecutter.project_slug}}-secrets
                  key: s3-bucket
            - name: {{cookiecutter.package_name_upper}}_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{cookiecutter.project_slug}}-secrets
                  key: s3-access-key
            - name: {{cookiecutter.package_name_upper}}_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{cookiecutter.project_slug}}-secrets
                  key: s3-secret-key
            - name: {{cookiecutter.package_name_upper}}_APP_DB_DSN
              valueFrom:
                secretKeyRef:
                  name: {{cookiecutter.project_slug}}-secrets
                  key: app-db-dsn
            - name: {{cookiecutter.package_name_upper}}_CATALOG_DSN
              valueFrom:
                secretKeyRef:
                  name: {{cookiecutter.project_slug}}-secrets
                  key: catalog-dsn
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
