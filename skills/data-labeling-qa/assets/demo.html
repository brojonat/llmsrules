      function __resizeIframe(obj) {
        const scrollbarHeight = 20; // Max between windows, mac, and linux

        function setHeight() {
          // Guard against race condition where iframe isn't ready
          if (!obj.contentWindow?.document?.documentElement) {
            return;
          }
          const element = obj.contentWindow.document.documentElement;
          // If there is no vertical scrollbar, we don't need to resize the iframe
          if (element.scrollHeight === element.clientHeight) {
            return;
          }

          // Create a new height that includes the scrollbar height if it's visible
          const hasHorizontalScrollbar = element.scrollWidth > element.clientWidth;
          const newHeight = element.scrollHeight + (hasHorizontalScrollbar ? scrollbarHeight : 0);

          // Only update the height if it's different from the current height
          if (obj.style.height !== `${newHeight}px`) {
            obj.style.height = `${newHeight}px`;
          }
        }

        // Resize the iframe to the height of the content and bottom scrollbar height
        setHeight();

        // Resize the iframe when the content changes
        const resizeObserver = new ResizeObserver((_entries) => {
          setHeight();
        });
        // Only observe if iframe content is ready
        if (obj.contentWindow?.document?.body) {
          resizeObserver.observe(obj.contentWindow.document.body);
        }
      }
    </script>

: null, "disabled": false, "hide_code": false}, "id": "Hstk", "name": "_"}, {"code": "", "code_hash": "a16b2dab80a72018566904a7b54181dd", "config": {"column": null, "disabled": false, "hide_code": false}, "id": "nWHF", "name": "_"}, {"code": "", "code_hash": "9b401834bcb5dbf289d07168f4ec8043", "config": {"column": null, "disabled": false, "hide_code": false}, "id": "iLit", "name": "_"}, {"code": "", "code_hash": "f488c2b60b1b8129acc7970b03236e89", "config": {"column": null, "disabled": false, "hide_code": false}, "id": "ZHCJ", "name": "_"}, {"code": "", "code_hash": "3426cfebea45d6f239e8c201f2d9a9bc", "config": {"column": null, "disabled": false, "hide_code": false}, "id": "ROlb", "name": "_"}, {"code": "", "code_hash": "05fd8e07059cec86a6d9101f8c576b1a", "config": {"column": null, "disabled": false, "hide_code": false}, "id": "qnkX", "name": "_"}, {"code": "", "code_hash": "d09de51af4c0d677ca98e7390e6228c4", "config": {"column": null, "disabled": false, "hide_code": false}, "id": "TqIu", "name": "_"}, {"code": "", "code_hash": "44c20fa61ca8dad9b564328b164395ef", "config": {"column": null, "disabled": false, "hide_code": false}, "id": "Vxnm", "name": "_"}, {"code": "", "code_hash": "2d1f353702a8538db3ddab753afd1929", "config": {"column": null, "disabled": false, "hide_code": false}, "id": "DnEU", "name": "_"}], "metadata": {"marimo_version": "0.23.0"}, "version": "1"},
            "session": {"cells": [{"code_hash": "d311c002c7a8ed00eb8e4952b51e2ae4", "console": [], "id": "Hbol", "outputs": [{"ename": "exception", "evalue": "No module named 'llm'", "traceback": null, "type": "error"}]}, {"code_hash": "873f073d38949e27cec55941b05869a0", "console": [], "id": "MJUe", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch1 id=\"data-labeling-qa\"\u003EData Labeling QA\u003C/h1\u003E\n\u003Cspan class=\"paragraph\"\u003EAudit an untrusted labeled dataset \u003Cstrong\u003Ebefore\u003C/strong\u003E burning GPU on a\nfine-tuning run. Input is a dataframe with two columns:\n\u003Ccode\u003Edata\u003C/code\u003E and \u003Ccode\u003Euntrustworthy_label\u003C/code\u003E. Output is a per-row\n\u003Ccode\u003Etrust_score\u003C/code\u003E plus a prioritized review set.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EThis notebook deliberately corrupts AG News in three ways so\neach audit technique can be measured against known ground\ntruth. The pipeline itself only sees the corrupted labels --\n\u003Ccode\u003Elabel_true\u003C/code\u003E is hidden from the audits.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "21175d003d533a39db805919874d2ccc", "console": [], "id": "vblA", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"configuration\"\u003EConfiguration\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003ELowering \u003Ccode\u003EN_SAMPLES\u003C/code\u003E or \u003Ccode\u003EK_JUDGE\u003C/code\u003E makes the notebook faster and\ncheaper. The LLM judge only runs on the top \u003Ccode\u003EK_JUDGE\u003C/code\u003E flagged\nrows, so total LLM calls = \u003Ccode\u003EK_JUDGE\u003C/code\u003E regardless of dataset\nsize.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "de3d6b9ea8bac78dc457e86f3a2f17c7", "console": [], "id": "bkHC", "outputs": [{"ename": "exception", "evalue": "An ancestor raised an exception (ModuleNotFoundError): ", "traceback": null, "type": "error"}]}, {"code_hash": "fcf925f5a982d6f5c8736f9a1648a191", "console": [], "id": "lEQa", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"step-0-load-and-corrupt-the-data\"\u003EStep 0 -- Load and corrupt the data\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003EReal buyers start with an already-labeled dataset. We\nsimulate that by loading AG News, keeping the true labels\naside for evaluation only, and producing an\n\u003Ccode\u003Euntrustworthy_label\u003C/code\u003E column that contains three kinds of\ninjected errors.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "76be2c129e960afc563a597eee2ec3fa", "console": [], "id": "PKri", "outputs": [{"ename": "exception", "evalue": "An ancestor raised an exception (ModuleNotFoundError): ", "traceback": null, "type": "error"}]}, {"code_hash": "518dd1e7b929516ab3d2f5a96a2932c9", "console": [], "id": "Xref", "outputs": [{"ename": "exception", "evalue": "An ancestor raised an exception (ModuleNotFoundError): ", "traceback": null, "type": "error"}]}, {"code_hash": "b3de6974001b1e97c6bfafccecde70d7", "console": [], "id": "SFPL", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"step-1-provenance-integrity-audit\"\u003EStep 1 -- Provenance / integrity audit\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003EBefore touching a model, check the data \u003Cem\u003Estructure\u003C/em\u003E. Off-by-one\nbugs, duplicate rows, null labels, schema drift -- these are\ncheap to catch and they don't need any ML at all. If your\naudit pipeline skips this step you'll waste compute on\nconfident-learning flags that are really just data pipeline\nbugs.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EFor this synthetic demo the integrity checks below are all\ngreen, but we include a per-class label length fingerprint\nthat can catch off-by-one misalignment when the content\ndistribution per class is distinctive. In production you'd\nadd domain-specific checks (timestamps, IDs, content hashes,\nlabel enum validation).\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "ade1141f141033b90167a111e8d62fe1", "console": [], "id": "BYtC", "outputs": [{"ename": "exception", "evalue": "An ancestor raised an exception (ModuleNotFoundError): ", "traceback": null, "type": "error"}]}, {"code_hash": "645c5900a6f90916009b173efae5f986", "console": [], "id": "RGSE", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"step-2-confident-learning-with-cleanlab\"\u003EStep 2 -- Confident learning with \u003Ccode\u003Ecleanlab\u003C/code\u003E\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003ETrain a quick model on the noisy labels using \u003Cstrong\u003Ek-fold\ncross-validation\u003C/strong\u003E, so every row gets a prediction from a\nmodel that didn't see it during training. Cleanlab then\ncompares predicted probabilities against the given labels\nand flags rows where the model confidently disagrees -- those\nare very likely mislabels.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EThe model here is a bare TF-IDF + logistic regression. For\nimage / tabular / multimodal data you'd swap in your own\ncross-validated probability estimates; the cleanlab API is\nthe same.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "af07e6c77527fab98868740eef6bc61c", "console": [], "id": "Kclp", "outputs": [{"ename": "exception", "evalue": "An ancestor raised an exception (ModuleNotFoundError): ", "traceback": null, "type": "error"}]}, {"code_hash": "669b00ee64cda587e83fa690ea8c4649", "console": [], "id": "emfo", "outputs": [{"ename": "exception", "evalue": "An ancestor raised an exception (ModuleNotFoundError): ", "traceback": null, "type": "error"}]}, {"code_hash": "12b14f01cca2c02083ce043af4a7d959", "console": [], "id": "Hstk", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"step-3-llm-as-judge-on-the-flagged-subset\"\u003EStep 3 -- LLM-as-judge on the flagged subset\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003ECleanlab catches \u003Cem\u003Erandom\u003C/em\u003E label noise well but struggles on\n\u003Cem\u003Esystematic\u003C/em\u003E confusion -- if Sports and Business are\nconsistently swapped, the model learns the swap and doesn't\nflag it as disagreement. That's what a semantic judge is for.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003ERather than sending every row to the judge (expensive), we\nsend only the top \u003Ccode\u003EK_JUDGE\u003C/code\u003E flagged rows from cleanlab plus a\nsmall random sample of unflagged rows (as a false-negative\naudit). For each row we ask the judge: \"does this label look\nright, and if not, what is correct?\"\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "a16b2dab80a72018566904a7b54181dd", "console": [], "id": "nWHF", "outputs": [{"ename": "exception", "evalue": "An ancestor raised an exception (ModuleNotFoundError): ", "traceback": null, "type": "error"}]}, {"code_hash": "9b401834bcb5dbf289d07168f4ec8043", "console": [], "id": "iLit", "outputs": [{"ename": "exception", "evalue": "An ancestor raised an exception (ModuleNotFoundError): ", "traceback": null, "type": "error"}]}, {"code_hash": "f488c2b60b1b8129acc7970b03236e89", "console": [], "id": "ZHCJ", "outputs": [{"ename": "exception", "evalue": "An ancestor raised an exception (ModuleNotFoundError): ", "traceback": null, "type": "error"}]}, {"code_hash": "3426cfebea45d6f239e8c201f2d9a9bc", "console": [], "id": "ROlb", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"step-4-final-trust-score-and-review-set\"\u003EStep 4 -- Final trust score and review set\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003ECombine all four signals into a per-row \u003Ccode\u003Etrust_score\u003C/code\u003E and a\n\u003Ccode\u003Ereview_action\u003C/code\u003E recommendation:\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Cstrong\u003Ecleanlab flagged\u003C/strong\u003E + \u003Cstrong\u003Ejudge rejected\u003C/strong\u003E \u2192 high confidence mislabel, use judge's \u003Ccode\u003Ecorrected_label\u003C/code\u003E\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003Ecleanlab flagged\u003C/strong\u003E + \u003Cstrong\u003Ejudge approved\u003C/strong\u003E \u2192 likely OK, keep original, note as ambiguous\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003Ecleanlab flagged\u003C/strong\u003E + \u003Cstrong\u003Eno judge call\u003C/strong\u003E \u2192 needs human review\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003Enot flagged\u003C/strong\u003E \u2192 trust as-is\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "05fd8e07059cec86a6d9101f8c576b1a", "console": [], "id": "qnkX", "outputs": [{"ename": "exception", "evalue": "An ancestor raised an exception (ModuleNotFoundError): ", "traceback": null, "type": "error"}]}, {"code_hash": "d09de51af4c0d677ca98e7390e6228c4", "console": [], "id": "TqIu", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"evaluation-how-well-did-the-audits-work\"\u003EEvaluation -- how well did the audits work?\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003EWe know the ground truth corruption, so we can measure each\naudit's \u003Cstrong\u003Eprecision\u003C/strong\u003E (of what we flagged, how much was actually\nwrong) and \u003Cstrong\u003Erecall\u003C/strong\u003E (of all real errors, how many we caught).\nThese numbers are only possible because this is a synthetic\ndemo; in production you'd spot-check a sample and trust the\naudits for the rest.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "44c20fa61ca8dad9b564328b164395ef", "console": [], "id": "Vxnm", "outputs": [{"ename": "exception", "evalue": "An ancestor raised an exception (ModuleNotFoundError): ", "traceback": null, "type": "error"}]}, {"code_hash": "2d1f353702a8538db3ddab753afd1929", "console": [], "id": "DnEU", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"what-to-do-next\"\u003EWhat to do next\u003C/h2\u003E\n\u003Col\u003E\n\u003Cli\u003E\u003Cstrong\u003EExport \u003Ccode\u003Ereview_action == 'relabel'\u003C/code\u003E rows.\u003C/strong\u003E These are the\n   highest-confidence errors -- cleanlab flagged AND the judge\n   confirmed. Feed the judge's \u003Ccode\u003Ecorrected_label\u003C/code\u003E back into\n   your labeling pipeline.\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003ESpot-check \u003Ccode\u003Eneeds_review\u003C/code\u003E by hand.\u003C/strong\u003E These are flagged\n   but un-judged (either over budget or the judge said YES\n   ambiguously). Your human reviewer time is best spent here.\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EKeep \u003Ccode\u003Ekeep (ambiguous)\u003C/code\u003E in the training set\u003C/strong\u003E but log\n   them -- if fine-tuning loss stays high on these at epoch\n   end, they're probably genuinely hard examples, not\n   mislabels.\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EAdjust \u003Ccode\u003EK_JUDGE\u003C/code\u003E upwards\u003C/strong\u003E if the recall curve at the top\n   of the notebook shows you're leaving errors on the table\n   by stopping at the cleanlab default budget.\u003C/li\u003E\n\u003C/ol\u003E\n\u003Ch2 id=\"llm-as-judge-vs-llm-as-labeler\"\u003ELLM-as-judge vs LLM-as-labeler\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003EThis notebook \u003Cem\u003Ejudges\u003C/em\u003E the human labels -- it keeps them where\nthey're right and flags them where they're wrong. The\nalternative is to \u003Cem\u003Ereplace\u003C/em\u003E the human labels entirely with LLM\nlabels. When to prefer each:\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Cstrong\u003EJudge (this notebook)\u003C/strong\u003E: default choice. Preserves human\n  signal on hard/ambiguous cases, focuses LLM spend on the\n  2-10% of rows that are actually suspicious.\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EFull LLM labeling\u003C/strong\u003E: only when you suspect the human\n  labelers are essentially guessing (\u0026gt; 30% error rate) or\n  when you have no human labels at all.\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003EDon't skip the provenance audit -- structural bugs\n(off-by-one, row misalignment) will survive both strategies\nand silently poison your fine-tune.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}], "metadata": {"marimo_version": "0.23.0", "script_metadata_hash": null}, "version": "1"},
            "runtimeConfig": null,
        };
    </script>
