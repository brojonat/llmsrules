      function __resizeIframe(obj) {
        const scrollbarHeight = 20; // Max between windows, mac, and linux

        function setHeight() {
          // Guard against race condition where iframe isn't ready
          if (!obj.contentWindow?.document?.documentElement) {
            return;
          }
          const element = obj.contentWindow.document.documentElement;
          // If there is no vertical scrollbar, we don't need to resize the iframe
          if (element.scrollHeight === element.clientHeight) {
            return;
          }

          // Create a new height that includes the scrollbar height if it's visible
          const hasHorizontalScrollbar = element.scrollWidth > element.clientWidth;
          const newHeight = element.scrollHeight + (hasHorizontalScrollbar ? scrollbarHeight : 0);

          // Only update the height if it's different from the current height
          if (obj.style.height !== `${newHeight}px`) {
            obj.style.height = `${newHeight}px`;
          }
        }

        // Resize the iframe to the height of the content and bottom scrollbar height
        setHeight();

        // Resize the iframe when the content changes
        const resizeObserver = new ResizeObserver((_entries) => {
          setHeight();
        });
        // Only observe if iframe content is ready
        if (obj.contentWindow?.document?.body) {
          resizeObserver.observe(obj.contentWindow.document.body);
        }
      }
    </script>

            "session": {"cells": [{"code_hash": "a971176a680882092f479070d9dde871", "console": [], "id": "Hbol", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "21684e23351c91cfbc7ff6b5fe3ba223", "console": [], "id": "MJUe", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch1 id=\"bayesian-bandits-thompson-sampling\"\u003EBayesian Bandits \u2014 Thompson Sampling\u003C/h1\u003E\n\u003Cspan class=\"paragraph\"\u003EMulti-armed bandits are the \"explore vs exploit\" problem: you have\nK slot machines (arms) with unknown reward probabilities, and you\nwant to maximize total reward over T rounds. Every pull teaches you\nsomething, but pulling a suboptimal arm costs you.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EThis notebook covers:\u003C/span\u003E\n\u003Col\u003E\n\u003Cli\u003E\u003Cstrong\u003EThompson sampling\u003C/strong\u003E \u2014 the Bayesian solution: maintain a Beta\n   posterior per arm, sample from each, pull the highest\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003ERegret analysis\u003C/strong\u003E \u2014 how much worse are you doing vs. always\n   pulling the best arm?\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EHead-to-head\u003C/strong\u003E \u2014 Thompson vs epsilon-greedy vs UCB1\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EContextual bandits\u003C/strong\u003E \u2014 when the best arm depends on features\u003C/li\u003E\n\u003C/ol\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "443ead3ad5d6e56d0ec14c422f5f553c", "console": [], "id": "vblA", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"experiment-configuration\"\u003EExperiment configuration\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "4d289823fd2d3a66e44d5c1ca796f4aa", "console": [], "id": "bkHC", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cmarimo-ui-element object-id='bkHC-0' random-id='b8342f1c-b112-22ca-ce6e-9eeb4ea63158'\u003E\u003Cmarimo-slider data-initial-value='5' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;number of arms\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-start='2' data-stop='10' data-step='1' data-steps='[]' data-debounce='false' data-disabled='false' data-orientation='\u0026quot;horizontal\u0026quot;' data-show-value='false' data-include-input='false' data-full-width='false'\u003E\u003C/marimo-slider\u003E\u003C/marimo-ui-element\u003E\u003Cmarimo-ui-element object-id='bkHC-1' random-id='5964cec0-5384-c50e-e6be-ea06ec8d0d5e'\u003E\u003Cmarimo-slider data-initial-value='2000' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;horizon (total rounds)\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-start='100' data-stop='5000' data-step='100' data-steps='[]' data-debounce='false' data-disabled='false' data-orientation='\u0026quot;horizontal\u0026quot;' data-show-value='false' data-include-input='false' data-full-width='false'\u003E\u003C/marimo-slider\u003E\u003C/marimo-ui-element\u003E\u003Cmarimo-ui-element object-id='bkHC-2' random-id='a7d2e187-6839-07c5-c2e2-1f36f93c0be2'\u003E\u003Cmarimo-slider data-initial-value='50' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;simulations (for averaged regret curves)\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-start='10' data-stop='200' data-step='10' data-steps='[]' data-debounce='false' data-disabled='false' data-orientation='\u0026quot;horizontal\u0026quot;' data-show-value='false' data-include-input='false' data-full-width='false'\u003E\u003C/marimo-slider\u003E\u003C/marimo-ui-element\u003E\u003Cmarimo-ui-element object-id='bkHC-3' random-id='56858900-2843-ed27-f8ad-ac6c68c16ea4'\u003E\u003Cmarimo-slider data-initial-value='0.1' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;epsilon (for epsilon-greedy)\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-start='0.01' data-stop='0.3' data-step='0.01' data-steps='[]' data-debounce='false' data-disabled='false' data-orientation='\u0026quot;horizontal\u0026quot;' data-show-value='false' data-include-input='false' data-full-width='false'\u003E\u003C/marimo-slider\u003E\u003C/marimo-ui-element\u003E\u003C/div\u003E"}, "type": "data"}]}, {"code_hash": "97c2c453b7d3fc8b83610c77a621f5cb", "console": [], "id": "lEQa", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"true-arm-probabilities-hidden-from-the-algorithms\"\u003ETrue arm probabilities (hidden from the algorithms)\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003EArm 0: \u003Cstrong\u003E0.715\u003C/strong\u003E | Arm 1: \u003Cstrong\u003E0.564\u003C/strong\u003E | Arm 2: \u003Cstrong\u003E0.518\u003C/strong\u003E | Arm 3: \u003Cstrong\u003E0.363\u003C/strong\u003E | Arm 4: \u003Cstrong\u003E0.157\u003C/strong\u003E\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EBest arm:\u003C/strong\u003E 0 (p = 0.715).\nThe gap between best and second-best is\n0.151 \u2014 this controls how hard the\nproblem is (smaller gap = harder to distinguish).\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "011c8b9b1a8a265f6ade844c7a2ca5b6", "console": [], "id": "PKri", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"the-three-algorithms\"\u003EThe three algorithms\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EThompson sampling (Bayesian):\u003C/strong\u003E Maintain a Beta(alpha, beta)\nposterior for each arm. Each round, draw a sample from every arm's\nposterior and pull the arm with the highest sample. Update the\nposterior with the result. That's it.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EEpsilon-greedy:\u003C/strong\u003E With probability epsilon, pull a random arm\n(explore). Otherwise, pull the arm with the highest observed mean\n(exploit). Simple but wastes exploration budget on clearly bad arms.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EUCB1 (Upper Confidence Bound):\u003C/strong\u003E Pull the arm with the highest\n\u003Cmarimo-tex class=\"arithmatex\"\u003E||(\\bar{x}_i + \\sqrt{\\frac{2 \\ln t}{n_i}}||)\u003C/marimo-tex\u003E. Optimistic in the face\nof uncertainty \u2014 always explores the arm you're least sure about.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "4071eda1b692a2ca341aa302e61568bf", "console": [], "id": "Xref", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "e6b31ea5c04b70efd46918fb49d2f399", "console": [], "id": "SFPL", "outputs": [{"data": {"text/html": "\u003Cmarimo-mime-renderer data-mime='\u0026quot;application/vnd.marimo+mimebundle\u0026quot;' data-data='\u0026quot;{\u0026#92;\u0026quot;image/png\u0026#92;\u0026quot;: \u0026#92;\u0026quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAACUwAAAPRCAYAAAAsynCuAAAAOnRFWHRTb2Z0d2FyZQBNYXRwbG90bGliIHZlcnNpb24zLjEwLjgsIGh0dHBzOi8vbWF0cGxvdGxpYi5vcmcvwVt1zgAAAAlwSFlzAAAewgAAHsIBbtB1PgABAABJREFUeJzs3Xd4FOXaBvB7tqQTQguhBEKLtNB7R5qAdBCkBgQURRQ7HD6KqKggoKgoCg t Thompson sampling per bin. More sophisticated: use a\nlogistic regression model per arm with Bayesian updates (Laplace\napproximation or variational inference).\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EBelow we simulate a 2-context, 3-arm problem where the best arm\nflips depending on context.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "758260a40103d6a225237bddd087976c", "console": [], "id": "nWHF", "outputs": [{"data": {"text/html": "\u003Cmarimo-mime-renderer data-mime='\u0026quot;application/vnd.marimo+mimebundle\u0026quot;' data-data='\u0026quot;{\u0026#92;\u0026quot;image/png\u0026#92;\u0026quot;: \u0026#92;\u0026quot;data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAC58AAAMJCAYAAAA+7WNnAAAAOnRFWHRTb2Z0d2FyZQBNYXRwbG90bGliIHZlcnNpb24zLjEwLjgsIGh0dHBzOi8vbWF0cGxvdGxpYi5vcmcvwVt1zgAAAAlwSFlzAAAewgAAHsIBbtB1PgABAABJREFUeJzs3XdYFNf7NvB7WXoHAQVFEMXee6XYY4kt9oYtxpLEb2LsRo0xMUaj0RiTaBS7xhZjr4C9i72ggg1R6b3P+wcv89t1d9ldWFjK/bkurmt35syZZ5bdhWfmmXMkgiAIICIiIiIiIiIiIiIiIiIiIiIiIiIiIiLKg4G+AyAiIiIiIiIiIiIiIiIiIiIiIiIiIiKi4o/F50RERERERERERERERERERERERERERESkFovPiYiIiIiIiIiIiIiIiIiIiIiIiIiIiEgtFp8TERERERERERERERERERERERERERERkVosPiciIiIiIiIiIiIiIiIiIiIiIiIiIiIitVh8TkRERERERERERERERERERERERERERERqsficiIiIiIiIiIiIiIiIiIiIiIiIiIiIiNRi8TkRERERERERERERERERERERERERERERqcXicyIiIiIiIiIiIiIiIiIiIiIiIiIiIiJSi8XnRERERERERERERERERERERERERERERKQWi8+JiIiIiIiIiIiIiIiIiIiIiIiIiIiISC0WnxMRERERERERERERERERERERERERERGRWiw+JyIiIiIiIiIiIiIiIiIiIiIiIiIiIiK1WHxORERERERERERERERERERERERERERERGqx+JyIiIiIiIiIiIiIiIiIiIiIiIiIiIiI1GLxORERERERERERERERERERERERERERERGpxeJzIiIiIiIiIiIiIiIiIiIiIiIiIiIiIlKLxedEREREREREREREREREREREREREREREpBaLz4mIiIiIiIiIiIiIiIiIiIiIiIiIiIhILRafExERFZEpU6ZAIpHA3Nwcr169UtpGIpGIP0RUeAYNGgSJRAInJyfExsbqOxwiIiIiIipmmMMTFR+tWrWCRCJB7dq1kZGRoe9wiIiIiIhKFHd3dzF3DQsL03c4Cnx8fMT4AgMD9R0OERERaYjF50RUosXHx2Pnzp0YO3YsGjZsiIoVK8LExARWVlaoXLkyOnbsiJkzZ+LixYv6DpX0TBAE7Nu3D5988gmqVq0KMzMzODo6omnTpliwYAFevHhRqPu/e/cuVq9eDQD48ssvUalSpULdH1FpExYWhrVr12LYsGFo0 bfeeqvftueyyy7Ttm3b9Pjjj6t58+aKiopS7dq11aNHD7333ntKS0vzW18AADifzRhjAt0JAADwu/T0dA0ZMkSStHv3bjVu3DiwHUJQefPNN3XfffdJktatW6errroqwD0CAAAAgMqLHB6ukMMDAAAAAAAAqIi48zkAAEAIeeuttyRJrVu35ktrAAAAAACCGDk8AAAAAAAAgIqIyecAAAAhYuXKlVq7dq0k6YEHHghwbwAAAAAAgDPk8AAAAAAAAAAqqohAdwAAAADO7d27V7m5udq2bZtGjRolSapbt66GDh0a4J4BAAAAAIDiyOEBAAAAAAAAVAZMPgcAAAhi3bp10969e0v8burUqapatWqAegQAAAAAABwhhwcAAAAAAABQGYQFugMAAABwLz4+Xp06ddL8+fN16623Bro7AAAAAADACXJ4AAAAAAAAABWZzRhjAt0JAAAAAAAAAAAAAAAAAAAAAEBw487nAAAAAAAAAAAAAAAAAAAAAAC3mHwOAAAAAAAAAAAAAAAAAAAAAHCLyecAAAAAAAAAAAAAAAAAAAAAALeYfA4AAAAAAAAAAAAAAAAAAAAAcIvJ5wAAAAAAAAAAAAAAAAAAAAAAt5h8DgAAAAAAAAAAAAAAAAAAAABwi8nnAAAAAAAAAAAAAAAAAAAAAAC3mHwOAAAAAAAAAAAAAAAAAAAAAHCLyecAAAAAAAAAAAAAAAAAAAAAALeYfA4AAAAAAAAAAAAAAAAAAAAAcIvJ5wAAAAAAAAAAAAAAAAAAAAAAt5h8DgAAAAAAAAAAAAAAAAAAAABwi8nnAAAAAAAAAAAAAAAAAAAAAAC3mHwOAAAAAAAAAAAAAAAAAAAAAHCLyecAAAAAAAAAAAAAAAAAAAAAALeYfA4AAAAAAAAAAAAAAAAAAAAAcIvJ5wAAAAAAAAAAAAAAAAAAAAAAt5h8DgAAAAAAAAAAAAAAAAAAAABw6/8DQw4fOCiZKwsAAAAASUVORK5CYII=\u0026#92;\u0026quot;, \u0026#92;\u0026quot;__metadata__\u0026#92;\u0026quot;: {\u0026#92;\u0026quot;image/png\u0026#92;\u0026quot;: {\u0026#92;\u0026quot;width\u0026#92;\u0026quot;: 1487, \u0026#92;\u0026quot;height\u0026#92;\u0026quot;: 388}}}\u0026quot;'\u003E\u003C/marimo-mime-renderer\u003E"}, "type": "data"}]}, {"code_hash": "1db56d5080a469993e60b97026b4e809", "console": [], "id": "iLit", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"why-thompson-sampling-works\"\u003EWhy Thompson sampling works\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003EThompson sampling has \u003Cstrong\u003Eoptimal\u003C/strong\u003E (Lai-Robbins) regret bounds for\nBernoulli bandits: \u003Cmarimo-tex class=\"arithmatex\"\u003E||(O(\\sum_i \\frac{\\ln T}{\\text{KL}(p_i, p^*)})||)\u003C/marimo-tex\u003E\nwhere the sum is over suboptimal arms and KL is the\nKullback-Leibler divergence.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EIntuitively:\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Cstrong\u003EEarly on\u003C/strong\u003E, posteriors are wide, so the algorithm explores\n  naturally \u2014 it's genuinely uncertain about which arm is best\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EOver time\u003C/strong\u003E, posteriors concentrate around the true values,\n  and the probability of sampling a suboptimal arm's posterior\n  above the best arm's shrinks exponentially\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EUnlike epsilon-greedy\u003C/strong\u003E, it never wastes exploration on arms\n  it's already confident are bad\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EUnlike UCB\u003C/strong\u003E, it randomizes exploration, which makes it robust\n  to adversarial settings and easier to deploy in batched/delayed\n  feedback scenarios\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003EThe connection to A/B testing is direct: a standard A/B test is a\n2-arm bandit where you fix the allocation (50/50) and only decide\nat the end. Thompson sampling \u003Cstrong\u003Eadapts allocation during the\nexperiment\u003C/strong\u003E, sending more traffic to the arm that appears better,\nreducing the total number of users exposed to the worse variant.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "5fba5d8aec50e8b4f805b8a2f9f09305", "console": [], "id": "ZHCJ", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"real-world-applications\"\u003EReal-world applications\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003EThompson sampling works anywhere you repeatedly choose among\noptions and observe a reward. The key requirement: \u003Cstrong\u003Efast feedback\nloops\u003C/strong\u003E so the bandit can adapt allocation in real time.\u003C/span\u003E\n\u003Ch3 id=\"ad-creative-rotation\"\u003EAd creative rotation\u003C/h3\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Cstrong\u003EArms:\u003C/strong\u003E 5-10 ad creatives (images, headlines, CTAs)\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EReward:\u003C/strong\u003E click (1) or no click (0)\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EModel:\u003C/strong\u003E Beta-Bernoulli per creative\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EWhy bandits:\u003C/strong\u003E you serve millions of impressions/day \u2014 even a\n  few hours of exploration is enough to identify the winner, and\n  every impression on a bad creative is wasted ad spend\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EGotcha:\u003C/strong\u003E creatives fatigue over time \u2014 use a sliding window\n  or discounted Thompson to adapt\u003C/li\u003E\n\u003C/ul\u003E\n\u003Ch3 id=\"dynamic-pricing\"\u003EDynamic pricing\u003C/h3\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Cstrong\u003EArms:\u003C/strong\u003E 4-6 price points ($9.99, $12.99, $14.99, $19.99, ...)\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EReward:\u003C/strong\u003E purchase (1/0), or revenue ($) for continuous reward\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EModel:\u003C/strong\u003E Beta-Bernoulli per price for conversion; Normal-\n  InverseGamma per price for revenue\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EWhy bandits:\u003C/strong\u003E you want to converge to the revenue-maximizing\n  price without running a month-long A/B test at each price point\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EExtension:\u003C/strong\u003E contextual \u2014 optimal price may differ by user\n  segment (new vs. returning, geography, device)\u003C/li\u003E\n\u003C/ul\u003E\n\u003Ch3 id=\"content-recommendation-news-streaming\"\u003EContent recommendation (news, streaming)\u003C/h3\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Cstrong\u003EArms:\u003C/strong\u003E top-N articles or shows to feature in the hero slot\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EReward:\u003C/strong\u003E click-through (1/0) or engagement time\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EModel:\u003C/strong\u003E contextual Thompson \u2014 features include user history,\n  time of day, device\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EWhy bandits:\u003C/strong\u003E content is perishable (news articles, trending\n  shows) \u2014 you need to learn and exploit within hours, not weeks\u003C/li\u003E\n\u003C/ul\u003E\n\u003Ch3 id=\"clinical-dose-finding-phase-i-trials\"\u003EClinical dose-finding (Phase I trials)\u003C/h3\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Cstrong\u003EArms:\u003C/strong\u003E dose levels (10mg, 25mg, 50mg, 100mg)\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EReward:\u003C/strong\u003E efficacy without toxicity (binary or ordinal)\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EModel:\u003C/strong\u003E Beta-Bernoulli per dose, with monotonicity constraint\n  (higher dose = higher efficacy but also higher toxicity)\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EWhy bandits:\u003C/strong\u003E minimize patient exposure to ineffective or\n  toxic doses \u2014 every allocation to a bad arm is an actual patient\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003ERegulatory note:\u003C/strong\u003E adaptive designs need pre-registration and\n  simulation-based operating characteristics\u003C/li\u003E\n\u003C/ul\u003E\n\u003Ch3 id=\"notification-timing\"\u003ENotification timing\u003C/h3\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Cstrong\u003EArms:\u003C/strong\u003E time slots (morning, afternoon, evening, night)\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EReward:\u003C/strong\u003E user opened the notification (1/0)\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EModel:\u003C/strong\u003E contextual Thompson \u2014 context = user timezone, app\n  usage pattern, day of week\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EWhy bandits:\u003C/strong\u003E optimal timing varies per user \u2014 a global A/B\n  test finds the best average time, but bandits personalize\u003C/li\u003E\n\u003C/ul\u003E\n\u003Ch3 id=\"feature-flag-rollout\"\u003EFeature flag rollout\u003C/h3\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Cstrong\u003EArms:\u003C/strong\u003E feature ON vs. feature OFF\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EReward:\u003C/strong\u003E key engagement metric (conversion, retention)\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EModel:\u003C/strong\u003E Beta-Bernoulli (same as A/B test, but adaptive)\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EWhy bandits over A/B test:\u003C/strong\u003E if the feature is clearly better\n  after 1000 users, bandits automatically ramp it to 100% without\n  waiting for a predetermined sample size\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "0e21900051a9daf6903b94c6e45e5a08", "console": [], "id": "ROlb", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"applying-to-your-data\"\u003EApplying to your data\u003C/h2\u003E\n\u003Ch3 id=\"expected-data-format\"\u003EExpected data format\u003C/h3\u003E\n\u003Cspan class=\"paragraph\"\u003EA bandit needs an \u003Cstrong\u003Eevent log\u003C/strong\u003E \u2014 one row per interaction:\u003C/span\u003E\n\u003Ctable\u003E\n\u003Cthead\u003E\n\u003Ctr\u003E\n\u003Cth\u003EColumn\u003C/th\u003E\n\u003Cth\u003EType\u003C/th\u003E\n\u003Cth\u003EDescription\u003C/th\u003E\n\u003C/tr\u003E\n\u003C/thead\u003E\n\u003Ctbody\u003E\n\u003Ctr\u003E\n\u003Ctd\u003E\u003Ccode\u003Etimestamp\u003C/code\u003E\u003C/td\u003E\n\u003Ctd\u003Edatetime\u003C/td\u003E\n\u003Ctd\u003EWhen the interaction happened\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd\u003E\u003Ccode\u003Earm\u003C/code\u003E\u003C/td\u003E\n\u003Ctd\u003Estr/int\u003C/td\u003E\n\u003Ctd\u003EWhich variant was shown\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd\u003E\u003Ccode\u003Ereward\u003C/code\u003E\u003C/td\u003E\n\u003Ctd\u003E0 or 1\u003C/td\u003E\n\u003Ctd\u003EDid the user convert? (Bernoulli)\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd\u003E\u003Ccode\u003Econtext\u003C/code\u003E\u003C/td\u003E\n\u003Ctd\u003Edict/cols\u003C/td\u003E\n\u003Ctd\u003E(Optional) User features for contextual bandits\u003C/td\u003E\n\u003C/tr\u003E\n\u003C/tbody\u003E\n\u003C/table\u003E\n\u003Cdiv class=\"language-python codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003E\u003Cspan class=\"kn\"\u003Eimport\u003C/span\u003E\u003Cspan class=\"w\"\u003E \u003C/span\u003E\u003Cspan class=\"nn\"\u003Eibis\u003C/span\u003E\n\n\u003Cspan class=\"n\"\u003Eevents\u003C/span\u003E \u003Cspan class=\"o\"\u003E=\u003C/span\u003E \u003Cspan class=\"n\"\u003Eibis\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Educkdb\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Econnect\u003C/span\u003E\u003Cspan class=\"p\"\u003E()\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Eread_parquet\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"s2\"\u003E\u0026quot;data/events.parquet\u0026quot;\u003C/span\u003E\u003Cspan class=\"p\"\u003E)\u003C/span\u003E\n\n\u003Cspan class=\"c1\"\u003E# Aggregate to sufficient statistics per arm\u003C/span\u003E\n\u003Cspan class=\"n\"\u003Earm_stats\u003C/span\u003E \u003Cspan class=\"o\"\u003E=\u003C/span\u003E \u003Cspan class=\"p\"\u003E(\u003C/span\u003E\n    \u003Cspan class=\"n\"\u003Eevents\u003C/span\u003E\n    \u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Egroup_by\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"s2\"\u003E\u0026quot;arm\u0026quot;\u003C/span\u003E\u003Cspan class=\"p\"\u003E)\u003C/span\u003E\n    \u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Eaggregate\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\n        \u003Cspan class=\"n\"\u003Esuccesses\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"n\"\u003Eevents\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Ereward\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Esum\u003C/span\u003E\u003Cspan class=\"p\"\u003E()\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Ecast\u003C/span\u003E\u003Cspan class=\"p\"\u003E(\u003C/span\u003E\u003Cspan class=\"s2\"\u003E\u0026quot;int64\u0026quot;\u003C/span\u003E\u003Cspan class=\"p\"\u003E),\u003C/span\u003E\n        \u003Cspan class=\"n\"\u003Etrials\u003C/span\u003E\u003Cspan class=\"o\"\u003E=\u003C/span\u003E\u003Cspan class=\"n\"\u003Eevents\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Ecount\u003C/span\u003E\u003Cspan class=\"p\"\u003E(),\u003C/span\u003E\n    \u003Cspan class=\"p\"\u003E)\u003C/span\u003E\n    \u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Eexecute\u003C/span\u003E\u003Cspan class=\"p\"\u003E()\u003C/span\u003E\n\u003Cspan class=\"p\"\u003E)\u003C/span\u003E\n\n\u003Cspan class=\"c1\"\u003E# Initialize Thompson sampler from historical data\u003C/span\u003E\n\u003Cspan class=\"k\"\u003Efor\u003C/span\u003E \u003Cspan class=\"n\"\u003E_\u003C/span\u003E\u003Cspan class=\"p\"\u003E,\u003C/span\u003E \u003Cspan class=\"n\"\u003Erow\u003C/span\u003E \u003Cspan class=\"ow\"\u003Ein\u003C/span\u003E \u003Cspan class=\"n\"\u003Earm_stats\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Eiterrows\u003C/span\u003E\u003Cspan class=\"p\"\u003E():\u003C/span\u003E\n    \u003Cspan class=\"n\"\u003Esampler\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Ealphas\u003C/span\u003E\u003Cspan class=\"p\"\u003E[\u003C/span\u003E\u003Cspan class=\"n\"\u003Erow\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Earm\u003C/span\u003E\u003Cspan class=\"p\"\u003E]\u003C/span\u003E \u003Cspan class=\"o\"\u003E=\u003C/span\u003E \u003Cspan class=\"mi\"\u003E1\u003C/span\u003E \u003Cspan class=\"o\"\u003E+\u003C/span\u003E \u003Cspan class=\"n\"\u003Erow\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Esuccesses\u003C/span\u003E\n    \u003Cspan class=\"n\"\u003Esampler\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Ebetas\u003C/span\u003E\u003Cspan class=\"p\"\u003E[\u003C/span\u003E\u003Cspan class=\"n\"\u003Erow\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Earm\u003C/span\u003E\u003Cspan class=\"p\"\u003E]\u003C/span\u003E \u003Cspan class=\"o\"\u003E=\u003C/span\u003E \u003Cspan class=\"mi\"\u003E1\u003C/span\u003E \u003Cspan class=\"o\"\u003E+\u003C/span\u003E \u003Cspan class=\"n\"\u003Erow\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Etrials\u003C/span\u003E \u003Cspan class=\"o\"\u003E-\u003C/span\u003E \u003Cspan class=\"n\"\u003Erow\u003C/span\u003E\u003Cspan class=\"o\"\u003E.\u003C/span\u003E\u003Cspan class=\"n\"\u003Esuccesses\u003C/span\u003E\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\n\u003Ch3 id=\"when-bandits-are-the-right-tool\"\u003EWhen bandits are the right tool\u003C/h3\u003E\n\u003Cul\u003E\n\u003Cli\u003EYou can \u003Cstrong\u003Eact on results in real time\u003C/strong\u003E (update allocation each\n  batch or each request)\u003C/li\u003E\n\u003Cli\u003EThe feedback loop is \u003Cstrong\u003Efast\u003C/strong\u003E (hours, not weeks)\u003C/li\u003E\n\u003Cli\u003EYou care about \u003Cstrong\u003Eminimizing total regret\u003C/strong\u003E (cumulative exposure\n  to the worse variant), not just identifying a winner\u003C/li\u003E\n\u003C/ul\u003E\n\u003Ch3 id=\"when-to-use-something-else\"\u003EWhen to use something else\u003C/h3\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Cstrong\u003EYou need a causal effect estimate\u003C/strong\u003E with pre-registered sample\n  size \u2192 A/B test (\u003Ccode\u003Ebayesian-ab-testing\u003C/code\u003E)\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EFeedback is delayed by days/weeks\u003C/strong\u003E \u2192 bandits can't adapt fast\n  enough; use a fixed-allocation test\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EYou have \u0026gt; 50 arms with sparse rewards\u003C/strong\u003E \u2192 explore\n  collaborative filtering or neural bandits\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003ERewards change over time\u003C/strong\u003E \u2192 use discounted Thompson sampling\n  (not covered here)\u003C/li\u003E\n\u003C/ul\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "7f41bbc19a42e2a88220717eb2829499", "console": [], "id": "qnkX", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"takeaway\"\u003ETakeaway\u003C/h2\u003E\n\u003Col\u003E\n\u003Cli\u003E\u003Cstrong\u003EThompson sampling = sample from the posterior, pull the\n   highest.\u003C/strong\u003E For Bernoulli arms, the posterior is\n   Beta(1 + successes, 1 + failures). No MCMC needed.\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003ERegret, not accuracy.\u003C/strong\u003E The right metric for bandits is\n   cumulative regret (total reward lost vs. the oracle), not\n   \"which arm won.\" Lower regret = fewer users exposed to the\n   worse arm.\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EThompson beats epsilon-greedy and UCB on most practical\n   problems\u003C/strong\u003E \u2014 it concentrates exploration where it matters and\n   naturally handles unequal arm quality.\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EContextual bandits\u003C/strong\u003E = Thompson per context. For continuous\n   contexts, use logistic Thompson sampling or neural bandits.\u003C/li\u003E\n\u003C/ol\u003E\n\u003Cspan class=\"paragraph\"\u003EDrop the \u003Ccode\u003ESKILL.md\u003C/code\u003E from this bundle into your project's\n\u003Ccode\u003E.claude/skills/bayesian-bandits/\u003C/code\u003E directory and your AI agent\nwill follow the same patterns on your real data.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}], "metadata": {"marimo_version": "0.23.1", "script_metadata_hash": null}, "version": "1"},
            "runtimeConfig": null,
        };
    </script>
